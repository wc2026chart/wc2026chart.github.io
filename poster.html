function cvtTime(t,off){
  let h,mi=0;
  if(t==='12a')h=0;
  else if(t.endsWith('a')){h=parseInt(t)}
  else if(t.includes(':')){const p=t.replace(/p$/,'').split(':');h=parseInt(p[0]);mi=parseInt(p[1]);if(h!==12)h+=12}
  else if(t.endsWith('p')){h=parseInt(t);if(h!==12)h+=12}
  else return[t,0];
  // Work in total minutes for half-hour offset support
  let totalMin=h*60+mi+Math.round(off*60);
  let ds=0;
  while(totalMin<0){totalMin+=1440;ds--}
  while(totalMin>=1440){totalMin-=1440;ds++}
  h=Math.floor(totalMin/60);mi=totalMin%60;
  let r;
  if(h===0)r=mi?'12:'+String(mi).padStart(2,'0')+'a':'12a';
  else if(h<12)r=mi?h+':'+String(mi).padStart(2,'0')+'a':h+'a';
  else if(h===12)r=mi?'12:'+String(mi).padStart(2,'0')+'p':'12p';
  else{const x=h-12;r=mi?x+':'+String(mi).padStart(2,'0')+'p':x+'p'}
  return[r,ds];
}
function shiftDt(d,s){
  if(!s)return d;
  const p=d.split('/');let mo=+p[0],dy=+p[1];dy+=s;
  const dim={6:30,7:31};
  if(dy<1){mo--;dy+=dim[mo]||30}
  else if(dy>(dim[mo]||30)){dy-=dim[mo]||30;mo++}
  return mo+'/'+dy;
}

        else{oP=38;wP=176;}
        const flankW=(oP/wP*100).toFixed(1)+'%';

        const tD=(time.includes(':')&&chan)?time.replace(/[ap]$/,''):time;
        const flanks=`<div class="mc-flank mc-flank-l" style="width:${flankW}"></div><div class="mc-flank mc-flank-r" style="width:${flankW}"></div>`;
        let inner=flanks;
        if(isKO){
          const rd=KOL[grp]||grp;const hasT=!!t1;const hasF=!!f1;let r3='';
          if(hasT)r3=`<div class="mc-ko-feeder">${t1} <span style="color:${P.textGold}">v</span> ${t2}</div>`;
          if(hasF)r3+=`<div class="mc-ko-feeder">${f1} <span style="color:${P.textGold}">v</span> ${f2}</div>`;

        } else {
          inner+=`<div class="mc-teams-row"><span class="mc-team-left">${t1}</span><span class="mc-tv">v</span><span class="mc-team-right">${t2}</span></div>

        }
        gh+=`<div class="mc" style="left:-${oP}%;width:${wP}%;background-color:${bg};z-index:5;overflow:hidden">${inner}</div>`;
      });
    }
    gh+='</div>';
  });

});

function bLn(x1,y1,x2,y2){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);

function bTxt(x,y,str,size,color,anchor){
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x);t.setAttribute('y',y+size*0.35);
  t.setAttribute('font-size',size);t.setAttribute('fill',color||bTC);

}

function buildBH(seeds,matches,x0,y0,dir,sfBias){
  const sYs=[];let y=y0;
  for(let i=0;i<seeds.length;i++){
    sYs.push(y);
    if(i%2===1&&i<seeds.length-1)y+=bH*0.3;
    if(i%4===3&&i<seeds.length-1)y+=bGap;
    if(i%8===7&&i<seeds.length-1)y+=bBigGap;
    y+=bH;
  }
  let x=x0;
  for(let i=0;i<seeds.length;i++){
    if(dir===1){bTxt(x-2,sYs[i],seeds[i],18,bGC,'end');bLn(x,sYs[i],x+bLL,sYs[i]);}
    else{bTxt(x+2,sYs[i],seeds[i],18,bGC,'start');bLn(x-bLL,sYs[i],x,sYs[i]);}
  }
  x+=dir*bLL;
  const r32=[];
  for(let i=0;i<seeds.length;i+=2){const m=(sYs[i]+sYs[i+1])/2;r32.push(m);bLn(x,sYs[i],x,sYs[i+1]);bLn(x,m,x+dir*bLL,m);bTxt(x-dir*11,m,'#'+matches[0][i/2],16,bTC,dir===1?'end':'start');}
  x+=dir*bLL;
  const r16=[];
  for(let i=0;i<r32.length;i+=2){const m=(r32[i]+r32[i+1])/2;r16.push(m);bLn(x,r32[i],x,r32[i+1]);bLn(x,m,x+dir*bLL,m);bTxt(x-dir*11,m,'#'+matches[1][i/2],16,bTC,dir===1?'end':'start');}
  x+=dir*bLL;
  const qf=[];
  for(let i=0;i<r16.length;i+=2){const m=(r16[i]+r16[i+1])/2;qf.push(m);bLn(x,r16[i],x,r16[i+1]);bLn(x,m,x+dir*bLL,m);bTxt(x-dir*11,m,'#'+matches[2][i/2],16,bTC,dir===1?'end':'start');}
  x+=dir*bLL;
  const sfMid=(qf[0]+qf[1])/2;const sfOut=qf[0]+(qf[1]-qf[0])*sfBias;
  bLn(x,qf[0],x,qf[1]);bLn(x,sfOut,x+dir*bLL*1.2,sfOut);
  bTxt(x-dir*11,sfMid,'#'+matches[3][0],16,bTC,dir===1?'end':'start');
  x+=dir*bLL*1.2;
  return{sfY:sfOut,sfX:x,botY:sYs[sYs.length-1]};
}
